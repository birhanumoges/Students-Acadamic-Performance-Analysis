<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 960 580" width="960" height="580">

  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#090b1a"/>
      <stop offset="100%" stop-color="#0a1320"/>
    </linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#13152e"/>
      <stop offset="100%" stop-color="#0d1126"/>
    </linearGradient>
    <linearGradient id="accG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7b6fff"/>
      <stop offset="50%"  stop-color="#00e0b5"/>
      <stop offset="100%" stop-color="#7b6fff"/>
    </linearGradient>
    <linearGradient id="progG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7b6fff"/>
      <stop offset="100%" stop-color="#00e0b5"/>
    </linearGradient>
    <linearGradient id="botFadeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#090b1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#090b1a" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="cardF" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="20"
                    flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <pattern id="gridP" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0L0 0 0 48" fill="none" stroke="#fff" stroke-width="0.4" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <style>

  .img-slide{
    position:absolute;
    x:44px;y:118px;
    width:872px;height:390px;
    clip-path:inset(0 0 0 0 round 10px);
    animation-duration:17.5s;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  #si0{animation-name:img0;}
  #si1{animation-name:img1;}
  #si2{animation-name:img2;}
  #si3{animation-name:img3;}
  #si4{animation-name:img4;}
@keyframes img0{
  2.86%{opacity:1}
  17.14%{opacity:1}
  20.0%,100%{opacity:0}
}
@keyframes img1{
  0%,20.0%{opacity:0}
  22.86%{opacity:1}
  37.14%{opacity:1}
  40.0%,100%{opacity:0}
}
@keyframes img2{
  0%,40.0%{opacity:0}
  42.86%{opacity:1}
  57.14%{opacity:1}
  60.0%,100%{opacity:0}
}
@keyframes img3{
  0%,60.0%{opacity:0}
  62.86%{opacity:1}
  77.14%{opacity:1}
  80.0%,100%{opacity:0}
}
@keyframes img4{
  0%,80.0%{opacity:0}
  82.86%{opacity:1}
  97.14%{opacity:1}
  97.14%{opacity:1}
  100%{opacity:0}
}
@keyframes dot0{
  0.0%{opacity:1;r:7}
  20.0%,100%{opacity:.22;r:5}
}
  #dot0{animation:dot0 17.5s ease-in-out infinite;}
@keyframes dot1{
  0%,20.0%{opacity:.22;r:5}
  20.0%{opacity:1;r:7}
  40.0%,100%{opacity:.22;r:5}
}
  #dot1{animation:dot1 17.5s ease-in-out infinite;}
@keyframes dot2{
  0%,40.0%{opacity:.22;r:5}
  40.0%{opacity:1;r:7}
  60.0%,100%{opacity:.22;r:5}
}
  #dot2{animation:dot2 17.5s ease-in-out infinite;}
@keyframes dot3{
  0%,60.0%{opacity:.22;r:5}
  60.0%{opacity:1;r:7}
  80.0%,100%{opacity:.22;r:5}
}
  #dot3{animation:dot3 17.5s ease-in-out infinite;}
@keyframes dot4{
  0%,80.0%{opacity:.22;r:5}
  80.0%{opacity:1;r:7}
  100%{opacity:1;r:7}
}
  #dot4{animation:dot4 17.5s ease-in-out infinite;}
@keyframes prog{
  0.0%{width:0px}
  20.0%{width:174px}
  20.0%{width:174px}
  40.0%{width:349px}
  40.0%{width:349px}
  60.0%{width:523px}
  60.0%{width:523px}
  80.0%{width:698px}
  80.0%{width:698px}
  100.0%{width:872px}
  100%{width:872px}
}
  #prog{animation:prog 17.5s linear infinite;}
</style>

  <!-- Background -->
  <rect width="960" height="580" fill="url(#bgG)"/>
  <rect width="960" height="580" fill="url(#gridP)"/>
  <circle cx="-30" cy="-30" r="260" fill="#7b6fff" fill-opacity="0.05"/>
  <circle cx="990" cy="610" r="240" fill="#00e0b5" fill-opacity="0.04"/>

  <!-- Card -->
  <rect x="24" y="24" width="912" height="532" rx="20"
        fill="url(#cardG)" filter="url(#cardF)"
        stroke="#fff" stroke-opacity="0.055" stroke-width="1"/>
  <rect x="24" y="24" width="912" height="4" rx="2" fill="url(#accG)"/>

  <!-- Header -->
  <rect x="44" y="50" width="36" height="36" rx="9"
        fill="#7b6fff" fill-opacity="0.16"
        stroke="#7b6fff" stroke-opacity="0.42" stroke-width="0.8"/>
  <polygon points="62,58 75,63.5 62,69 49,63.5" fill="#9d97ff" fill-opacity="0.92"/>
  <rect x="71" y="64" width="2.5" height="6" rx="1.2" fill="#9d97ff" fill-opacity="0.7"/>
  <line x1="62" y1="69" x2="62" y2="76" stroke="#9d97ff" stroke-width="1.6"
        stroke-linecap="round" stroke-opacity="0.55"/>
  <ellipse cx="62" cy="76" rx="5" ry="2.5" fill="none" stroke="#9d97ff"
           stroke-width="1.2" stroke-opacity="0.5"/>

  <text x="90" y="65"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.3">
    Students Academic Performance Analysis
  </text>
  <rect x="90" y="73" width="156" height="17" rx="8.5"
        fill="#7b6fff" fill-opacity="0.14"
        stroke="#7b6fff" stroke-opacity="0.38" stroke-width="0.8"/>
  <text x="168" y="84.5" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" font-weight="600" fill="#a8a3ff"
        text-anchor="middle" letter-spacing="1.1">DASHBOARD PREVIEW</text>
  <line x1="44" y1="108" x2="916" y2="108"
        stroke="url(#accG)" stroke-opacity="0.22" stroke-width="0.8"/>

  <!-- Image placeholder background -->
  <rect x="44" y="118" width="872" height="390" rx="10" fill="#080a18"/>

  <!-- ═══ THE 5 DASHBOARD IMAGES (base64 encoded) ═══ -->
  <image id="si0" class="img-slide" href="data:image/png;base64," x="44" y="118" width="872" height="390" preserveAspectRatio="xMidYMid slice" opacity="1"/>
  <image id="si1" class="img-slide" href="data:image/png;base64," x="44" y="118" width="872" height="390" preserveAspectRatio="xMidYMid slice" opacity="0"/>
  <image id="si2" class="img-slide" href="data:image/png;base64," x="44" y="118" width="872" height="390" preserveAspectRatio="xMidYMid slice" opacity="0"/>
  <image id="si3" class="img-slide" href="data:image/png;base64," x="44" y="118" width="872" height="390" preserveAspectRatio="xMidYMid slice" opacity="0"/>
  <image id="si4" class="img-slide" href="data:image/png;base64," x="44" y="118" width="872" height="390" preserveAspectRatio="xMidYMid slice" opacity="0"/>

  <!-- Bottom edge fade overlay -->
  <rect x="44" y="448" width="872" height="60"
        fill="url(#botFadeG)" pointer-events="none"/>

  <!-- Image border frame -->
  <rect x="44" y="118" width="872" height="390" rx="10"
        fill="none" stroke="#fff" stroke-opacity="0.07" stroke-width="1"
        pointer-events="none"/>

  <!-- Slide label tag -->
  <rect x="58" y="482" width="210" height="24" rx="7"
        fill="#000" fill-opacity="0.60"
        stroke="#fff" stroke-opacity="0.10" stroke-width="0.6"/>
  <text class="lbl" id="lbl0" x="70" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="1" letter-spacing="0.3" style="animation:img0 17.5s ease-in-out infinite">Overview</text>
  <text class="lbl" id="lbl1" x="70" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0" letter-spacing="0.3" style="animation:img1 17.5s ease-in-out infinite">Performance Trends</text>
  <text class="lbl" id="lbl2" x="70" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0" letter-spacing="0.3" style="animation:img2 17.5s ease-in-out infinite">Grade Distribution</text>
  <text class="lbl" id="lbl3" x="70" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0" letter-spacing="0.3" style="animation:img3 17.5s ease-in-out infinite">Attendance Analysis</text>
  <text class="lbl" id="lbl4" x="70" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0" letter-spacing="0.3" style="animation:img4 17.5s ease-in-out infinite">Subject Comparison</text>

  <!-- Footer divider -->
  <line x1="44" y1="512" x2="916" y2="512"
        stroke="#fff" stroke-opacity="0.06" stroke-width="0.8"/>

  <!-- Progress track -->
  <rect x="44" y="520" width="872" height="4" rx="2"
        fill="#fff" fill-opacity="0.07"/>

  <!-- Progress fill (CSS animated) -->
  <rect id="prog" x="44" y="520" width="174" height="4" rx="2"
        fill="url(#progG)"/>

  <!-- Nav dots -->
  <circle id="dot0" cx="436" cy="546" r="5" fill="#00e0b5" fill-opacity="1"/>
  <circle id="dot1" cx="458" cy="546" r="5" fill="#00e0b5" fill-opacity=".22"/>
  <circle id="dot2" cx="480" cy="546" r="5" fill="#00e0b5" fill-opacity=".22"/>
  <circle id="dot3" cx="502" cy="546" r="5" fill="#00e0b5" fill-opacity=".22"/>
  <circle id="dot4" cx="524" cy="546" r="5" fill="#00e0b5" fill-opacity=".22"/>

  <!-- Footer hints -->
  <text x="44" y="550"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" fill="#fff" fill-opacity="0.22" letter-spacing="0.8">
    AUTO-ROTATING
  </text>
  <text x="916" y="550"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" fill="#fff" fill-opacity="0.22"
        text-anchor="end" letter-spacing="0.8">
    EVERY 3.5s
  </text>

</svg>
