<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 960 560" width="960" height="560">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0b0c1e"/>
      <stop offset="60%"  stop-color="#0e1228"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#141630"/>
      <stop offset="100%" stop-color="#0e1228"/>
    </linearGradient>

    <!-- Top accent bar -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c6fff"/>
      <stop offset="35%"  stop-color="#00e5b8"/>
      <stop offset="65%"  stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#00e5b8"/>
    </linearGradient>

    <!-- Progress bar gradient -->
    <linearGradient id="progGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#00e5b8"/>
    </linearGradient>

    <!-- Active dot glow -->
    <radialGradient id="dotGlow">
      <stop offset="0%"   stop-color="#00e5b8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5b8" stop-opacity="0"/>
    </radialGradient>

    <!-- Image top/bottom fades -->
    <linearGradient id="imgTopFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0b0c1e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0b0c1e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="imgBotFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0b0c1e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0b0c1e" stop-opacity="0.38"/>
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-3%" y="-3%" width="106%" height="114%">
      <feDropShadow dx="0" dy="6" stdDeviation="18"
                    flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Mesh grid pattern -->
    <pattern id="grid" x="0" y="0" width="48" height="48"
             patternUnits="userSpaceOnUse">
      <path d="M48 0L0 0 0 48" fill="none"
            stroke="#ffffff" stroke-width="0.35" stroke-opacity="0.035"/>
    </pattern>

    <!-- Image clip -->
    <clipPath id="imgClip">
      <rect x="44" y="118" width="872" height="374" rx="10"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════
       BACKGROUND
  ═══════════════════ -->
  <rect width="960" height="560" fill="url(#bgGrad)"/>
  <rect width="960" height="560" fill="url(#grid)"/>

  <!-- Ambient orbs -->
  <circle cx="-20"  cy="-20"  r="240" fill="#7c6fff" fill-opacity="0.055"/>
  <circle cx="980"  cy="580"  r="220" fill="#00e5b8" fill-opacity="0.045"/>
  <circle cx="480"  cy="560"  r="160" fill="#7c6fff" fill-opacity="0.03"/>

  <!-- ═══════════════════
       CARD
  ═══════════════════ -->
  <rect x="24" y="24" width="912" height="512" rx="20"
        fill="url(#cardGrad)"
        filter="url(#cardShadow)"
        stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="24" y="24" width="912" height="3.5" rx="1.75"
        fill="url(#accentGrad)"/>

  <!-- Inner top highlight -->
  <rect x="44" y="29" width="872" height="1" rx="0.5"
        fill="#ffffff" fill-opacity="0.04"/>

  <!-- ═══════════════════
       HEADER
  ═══════════════════ -->

  <!-- Icon box -->
  <rect x="44" y="52" width="36" height="36" rx="9"
        fill="#7c6fff" fill-opacity="0.15"
        stroke="#7c6fff" stroke-opacity="0.4" stroke-width="0.8"/>
  <!-- Graduation cap (simple shapes) -->
  <polygon points="62,60 74,65.5 62,71 50,65.5"
           fill="#9d97ff" fill-opacity="0.9"/>
  <rect x="70" y="66" width="2" height="6" rx="1"
        fill="#9d97ff" fill-opacity="0.7"/>
  <line x1="62" y1="71" x2="62" y2="78"
        stroke="#9d97ff" stroke-opacity="0.5"
        stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="62" cy="78" rx="5" ry="2.5"
           fill="none" stroke="#9d97ff"
           stroke-opacity="0.5" stroke-width="1.2"/>

  <!-- Title text -->
  <text x="90" y="67"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="700"
        fill="#ffffff" letter-spacing="0.3">
    Students Academic Performance Analysis
  </text>

  <!-- Subtitle badge -->
  <rect x="90" y="74" width="154" height="17" rx="8.5"
        fill="#7c6fff" fill-opacity="0.14"
        stroke="#7c6fff" stroke-opacity="0.38" stroke-width="0.8"/>
  <text x="167" y="85.5"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" font-weight="600"
        fill="#a8a2ff" text-anchor="middle" letter-spacing="1.1">
    DASHBOARD PREVIEW
  </text>

  <!-- Slide counter badge -->
  <rect x="848" y="56" width="68" height="24" rx="12"
        fill="#00e5b8" fill-opacity="0.1"
        stroke="#00e5b8" stroke-opacity="0.32" stroke-width="0.8"/>
  <text id="counter" x="882" y="72"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="700"
        fill="#00e5b8" text-anchor="middle">1 / 5</text>

  <!-- Auto/Pause status -->
  <circle id="statusDot" cx="835" cy="68" r="4" fill="#00e5b8"/>
  <text id="statusLbl" x="826" y="72"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="9" fill="#00e5b8" fill-opacity="0.75"
        text-anchor="end">AUTO</text>

  <!-- Header divider -->
  <line x1="44" y1="108" x2="916" y2="108"
        stroke="url(#accentGrad)" stroke-opacity="0.2" stroke-width="0.8"/>

  <!-- ═══════════════════
       IMAGE AREA
  ═══════════════════ -->

  <!-- Dark placeholder background -->
  <rect x="44" y="118" width="872" height="374" rx="10" fill="#0a0b1a"/>

  <!-- Placeholder label shown until images load -->
  <text x="480" y="302"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="13" fill="#ffffff" fill-opacity="0.1"
        text-anchor="middle">
    assets/dash1.png ‥ dash5.png
  </text>

  <!-- ── 5 IMAGES (stacked, JS fades between them) ── -->
  <g clip-path="url(#imgClip)">
    <image id="s1" href="assets/dash1.png"
           x="44" y="118" width="872" height="374"
           preserveAspectRatio="xMidYMid slice"
           opacity="1"/>
    <image id="s2" href="assets/dash2.png"
           x="44" y="118" width="872" height="374"
           preserveAspectRatio="xMidYMid slice"
           opacity="0"/>
    <image id="s3" href="assets/dash3.png"
           x="44" y="118" width="872" height="374"
           preserveAspectRatio="xMidYMid slice"
           opacity="0"/>
    <image id="s4" href="assets/dash4.png"
           x="44" y="118" width="872" height="374"
           preserveAspectRatio="xMidYMid slice"
           opacity="0"/>
    <image id="s5" href="assets/dash5.png"
           x="44" y="118" width="872" height="374"
           preserveAspectRatio="xMidYMid slice"
           opacity="0"/>
  </g>

  <!-- Top/bottom image fades (non-interactive overlays) -->
  <rect x="44" y="118" width="872" height="55"
        fill="url(#imgTopFade)" pointer-events="none"/>
  <rect x="44" y="437" width="872" height="55"
        fill="url(#imgBotFade)" pointer-events="none"/>

  <!-- Image border -->
  <rect x="44" y="118" width="872" height="374" rx="10"
        fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"
        pointer-events="none"/>

  <!-- ── SLIDE LABEL (bottom-left of image) ── -->
  <rect id="lblBg" x="58" y="458" width="196" height="26" rx="7"
        fill="#000000" fill-opacity="0.58"
        stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.6"
        pointer-events="none"/>
  <text id="lblText" x="70" y="475.5"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="600"
        fill="#ffffff" fill-opacity="0.9" letter-spacing="0.2"
        pointer-events="none">Overview Dashboard</text>

  <!-- ── PAUSE / PLAY BUTTON (top-right of image) ── -->
  <g id="pauseBtn" style="cursor:pointer">
    <rect x="878" y="126" width="30" height="20" rx="6"
          fill="#000000" fill-opacity="0.58"
          stroke="#ffffff" stroke-opacity="0.14" stroke-width="0.7"/>
    <!-- Pause bars -->
    <rect id="pb1" x="885" y="130" width="3.5" height="12"
          rx="1.2" fill="#ffffff" fill-opacity="0.85"/>
    <rect id="pb2" x="891" y="130" width="3.5" height="12"
          rx="1.2" fill="#ffffff" fill-opacity="0.85"/>
    <!-- Play triangle (hidden by default) -->
    <polygon id="ptri" points="885,130 899,136 885,142"
             fill="#ffffff" fill-opacity="0"/>
  </g>

  <!-- ── PREV ARROW ── -->
  <g id="prevBtn" opacity="0.72" style="cursor:pointer">
    <circle cx="78" cy="305" r="26"
            fill="#000000" fill-opacity="0.62"
            stroke="#ffffff" stroke-opacity="0.13" stroke-width="1"/>
    <polyline points="85,296 70,305 85,314"
              fill="none" stroke="#ffffff" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── NEXT ARROW ── -->
  <g id="nextBtn" opacity="0.72" style="cursor:pointer">
    <circle cx="882" cy="305" r="26"
            fill="#000000" fill-opacity="0.62"
            stroke="#ffffff" stroke-opacity="0.13" stroke-width="1"/>
    <polyline points="875,296 890,305 875,314"
              fill="none" stroke="#ffffff" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ═══════════════════
       FOOTER
  ═══════════════════ -->

  <!-- Divider -->
  <line x1="44" y1="500" x2="916" y2="500"
        stroke="#ffffff" stroke-opacity="0.055" stroke-width="0.8"/>

  <!-- Progress track -->
  <rect x="44" y="504" width="872" height="3.5" rx="1.75"
        fill="#ffffff" fill-opacity="0.07"/>

  <!-- Progress fill (JS updates width) -->
  <rect id="progBar" x="44" y="504" width="174.4" height="3.5" rx="1.75"
        fill="url(#progGrad)"/>

  <!-- ── NAV DOTS ── -->
  <!-- dot 1 – active -->
  <g id="nd1" style="cursor:pointer">
    <circle id="ng1" cx="441" cy="528" r="12" fill="url(#dotGlow)" fill-opacity="1"/>
    <circle id="dc1" cx="441" cy="528" r="6"  fill="#00e5b8"/>
  </g>
  <!-- dot 2 -->
  <g id="nd2" style="cursor:pointer">
    <circle id="ng2" cx="465" cy="528" r="12" fill="url(#dotGlow)" fill-opacity="0"/>
    <circle id="dc2" cx="465" cy="528" r="5.5" fill="#ffffff" fill-opacity="0.22"/>
  </g>
  <!-- dot 3 -->
  <g id="nd3" style="cursor:pointer">
    <circle id="ng3" cx="489" cy="528" r="12" fill="url(#dotGlow)" fill-opacity="0"/>
    <circle id="dc3" cx="489" cy="528" r="5.5" fill="#ffffff" fill-opacity="0.22"/>
  </g>
  <!-- dot 4 -->
  <g id="nd4" style="cursor:pointer">
    <circle id="ng4" cx="513" cy="528" r="12" fill="url(#dotGlow)" fill-opacity="0"/>
    <circle id="dc4" cx="513" cy="528" r="5.5" fill="#ffffff" fill-opacity="0.22"/>
  </g>
  <!-- dot 5 -->
  <g id="nd5" style="cursor:pointer">
    <circle id="ng5" cx="537" cy="528" r="12" fill="url(#dotGlow)" fill-opacity="0"/>
    <circle id="dc5" cx="537" cy="528" r="5.5" fill="#ffffff" fill-opacity="0.22"/>
  </g>

  <!-- Footer hint labels -->
  <text x="44" y="530"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" fill="#ffffff" fill-opacity="0.25"
        letter-spacing="0.8">← → NAVIGATE</text>
  <text x="916" y="530"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" fill="#ffffff" fill-opacity="0.25"
        text-anchor="end" letter-spacing="0.8">SPACE TO PAUSE</text>

  <!-- ═══════════════════
       JAVASCRIPT
  ═══════════════════ -->
  <script type="text/javascript">
  <![CDATA[
    /* ── CONFIG ───────────────────────────────── */
    var TOTAL    = 5;
    var INTERVAL = 3800;  /* ms per slide          */

    var LABELS = [
      "Overview Dashboard",
      "Performance Trends",
      "Grade Distribution",
      "Attendance Analysis",
      "Subject Comparison"
    ];

    /* ── STATE ────────────────────────────────── */
    var current = 1;
    var playing = true;
    var timer   = null;

    /* ── HELPERS ──────────────────────────────── */
    function $$(id) { return document.getElementById(id); }
    function set(id, attr, val) {
      var el = $$(id);
      if (el) el.setAttribute(attr, val);
    }

    /* ── TRANSITION (cross-fade via CSS) ──────── */
    /* SVG <image> transitions work in modern browsers  */
    function setOpacity(id, val, duration) {
      var el = $$(id);
      if (!el) return;
      el.style.transition = 'opacity ' + (duration || 0.65) + 's ease';
      el.setAttribute('opacity', val);
    }

    /* ── SHOW SLIDE n ─────────────────────────── */
    function show(n) {
      if (n < 1) n = TOTAL;
      if (n > TOTAL) n = 1;
      current = n;

      /* ── images ── */
      for (var i = 1; i <= TOTAL; i++) {
        setOpacity('s' + i, i === n ? '1' : '0');
      }

      /* ── dots ── */
      for (var i = 1; i <= TOTAL; i++) {
        if (i === n) {
          set('dc' + i, 'fill',         '#00e5b8');
          set('dc' + i, 'fill-opacity', '1');
          set('dc' + i, 'r',            '6');
          set('ng' + i, 'fill-opacity', '1');
        } else {
          set('dc' + i, 'fill',         '#ffffff');
          set('dc' + i, 'fill-opacity', '0.22');
          set('dc' + i, 'r',            '5.5');
          set('ng' + i, 'fill-opacity', '0');
        }
      }

      /* ── progress bar (872 px total) ── */
      set('progBar', 'width', (872 * n / TOTAL).toFixed(1));

      /* ── counter ── */
      var ctr = $$('counter');
      if (ctr) ctr.textContent = n + ' / ' + TOTAL;

      /* ── slide label ── */
      var lbl = $$('lblText');
      if (lbl && LABELS[n - 1]) {
        lbl.textContent = LABELS[n - 1];
        /* auto-width the label background */
        var bg = $$('lblBg');
        if (bg) bg.setAttribute('width', Math.max(120, LABELS[n-1].length * 7.5 + 26).toFixed(0));
      }
    }

    /* ── TIMER ────────────────────────────────── */
    function startTimer() {
      stopTimer();
      timer = setInterval(function() { show(current + 1); }, INTERVAL);
    }
    function stopTimer() {
      if (timer) { clearInterval(timer); timer = null; }
    }

    /* ── PLAY / PAUSE ─────────────────────────── */
    function setPlay(on) {
      playing = on;
      /* swap icons */
      set('pb1',  'fill-opacity', on ? '0.85' : '0');
      set('pb2',  'fill-opacity', on ? '0.85' : '0');
      set('ptri', 'fill-opacity', on ? '0'    : '0.85');
      /* status indicator */
      set('statusDot', 'fill', on ? '#00e5b8' : '#ff6b6b');
      var lbl = $$('statusLbl');
      if (lbl) {
        lbl.textContent = on ? 'AUTO' : 'PAUSE';
        lbl.setAttribute('fill', on ? '#00e5b8' : '#ff6b6b');
      }
      if (on) startTimer(); else stopTimer();
    }
    function togglePlay() { setPlay(!playing); }

    /* ── BIND CLICKS ──────────────────────────── */
    function on(id, fn) {
      var el = $$(id);
      if (el) el.addEventListener('click', fn);
    }

    on('nextBtn', function() { show(current + 1); if (playing) startTimer(); });
    on('prevBtn', function() { show(current - 1); if (playing) startTimer(); });
    on('pauseBtn', togglePlay);

    for (var i = 1; i <= TOTAL; i++) {
      (function(idx) {
        on('nd' + idx, function() { show(idx); if (playing) startTimer(); });
      })(i);
    }

    /* ── HOVER (arrows) ───────────────────────── */
    function hover(id, onOp, offOp) {
      var el = $$(id);
      if (!el) return;
      el.addEventListener('mouseenter', function() { el.setAttribute('opacity', onOp); });
      el.addEventListener('mouseleave', function() { el.setAttribute('opacity', offOp); });
    }
    hover('nextBtn', '1', '0.72');
    hover('prevBtn', '1', '0.72');

    /* ── KEYBOARD ─────────────────────────────── */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        show(current + 1); if (playing) startTimer();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        show(current - 1); if (playing) startTimer();
      }
      if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    });

    /* ── INIT ─────────────────────────────────── */
    show(1);
    startTimer();
  ]]>
  </script>

</svg>
